<!DOCTYPE html>

<html class="dark" lang="nl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2a2",
                        "background-light": "#f5f8f7",
                        "background-dark": "#10221c",
                        "neutral-dark": "#18342a",
                        "neutral-border": "#316855",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-tab-fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 justify-between border-b border-neutral-border/30">
<div class="flex items-center gap-4">
<button class="text-slate-900 dark:text-slate-100 flex size-10 items-center justify-center hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">Product Details</h2>
</div>
<div class="flex items-center gap-2">
<button class="flex size-10 items-center justify-center rounded-full hover:bg-primary/10 text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">favorite</span>
</button>
<button class="flex size-10 items-center justify-center rounded-full hover:bg-primary/10 text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">share</span>
</button>
</div>
</header>
<div class="bg-background-light dark:bg-background-dark">
<div class="flex border-b border-neutral-border/30 px-4 gap-8 overflow-x-auto no-scrollbar">
<a class="flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-4 transition-all hover:text-primary" href="#">
<p class="text-sm font-semibold">Media</p>
</a>
<a class="flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-4 transition-all hover:text-primary" href="#">
<p class="text-sm font-semibold">Omschrijving</p>
</a>
<a class="flex flex-col items-center justify-center border-b-2 border-primary text-primary pb-3 pt-4" href="#">
<p class="text-sm font-bold">Aanleverspecificaties</p>
</a>
</div>
</div>
<main class="flex-1 p-4 flex flex-col gap-6">
<section class="@container">
<div class="flex flex-col gap-4 rounded-xl border border-neutral-border/50 bg-neutral-dark/40 p-5 @[480px]:flex-row @[480px]:items-center justify-between shadow-sm">
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl active-tab-fill">settings_input_component</span>
<p class="text-slate-900 dark:text-slate-100 text-base font-bold">Jouw configuratie</p>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal">Bekijk de geselecteerde opties voor dit product.</p>
</div>
<button class="flex min-w-[100px] cursor-pointer items-center justify-center rounded-lg h-9 px-4 bg-primary text-background-dark text-sm font-bold shadow-lg shadow-primary/20 hover:bg-primary/90 transition-colors">
<span>Aanpassen</span>
</button>
</div>
</section>
<section class="flex flex-col gap-1">
<h3 class="text-slate-900 dark:text-slate-100 text-sm font-bold uppercase tracking-wider mb-2 opacity-70">Bestandseisen</h3>
<div class="space-y-1">
<label class="group flex items-center gap-4 py-3 px-2 rounded-lg hover:bg-primary/5 transition-colors cursor-pointer">
<div class="relative flex items-center">
<input checked="" class="peer h-5 w-5 rounded border-neutral-border border-2 bg-transparent text-primary focus:ring-primary focus:ring-offset-background-dark" type="checkbox"/>
</div>
<div class="flex flex-col">
<p class="text-slate-900 dark:text-slate-100 text-base font-medium">Bestandstype: PDF</p>
<p class="text-slate-500 dark:text-slate-400 text-xs">Aanleveren als drukklaar PDF/X-1a:2001</p>
</div>
</label>
<label class="group flex items-center gap-4 py-3 px-2 rounded-lg hover:bg-primary/5 transition-colors cursor-pointer">
<div class="relative flex items-center">
<input checked="" class="peer h-5 w-5 rounded border-neutral-border border-2 bg-transparent text-primary focus:ring-primary focus:ring-offset-background-dark" type="checkbox"/>
</div>
<div class="flex flex-col">
<p class="text-slate-900 dark:text-slate-100 text-base font-medium">Resolutie: 300 DPI</p>
<p class="text-slate-500 dark:text-slate-400 text-xs">Minimaal 300 DPI voor optimale scherpte</p>
</div>
</label>
<label class="group flex items-center gap-4 py-3 px-2 rounded-lg hover:bg-primary/5 transition-colors cursor-pointer">
<div class="relative flex items-center">
<input checked="" class="peer h-5 w-5 rounded border-neutral-border border-2 bg-transparent text-primary focus:ring-primary focus:ring-offset-background-dark" type="checkbox"/>
</div>
<div class="flex flex-col">
<p class="text-slate-900 dark:text-slate-100 text-base font-medium">Kleurprofiel: CMYK</p>
<p class="text-slate-500 dark:text-slate-400 text-xs">FOGRA39 profiel voor kleurvastheid</p>
</div>
</label>
</div>
</section>
<section class="mt-4 p-4 rounded-xl bg-primary/5 border border-primary/10 flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">ios_share</span>
<span class="text-sm font-medium text-slate-900 dark:text-slate-100">Deel dit product met collega's</span>
</div>
<a class="text-primary text-sm font-bold hover:underline" href="#">Kopieer link</a>
</section>
</main>
<nav class="sticky bottom-0 z-50 flex gap-2 border-t border-neutral-border/30 bg-background-light dark:bg-neutral-dark px-4 pb-6 pt-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-medium uppercase tracking-widest">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined active-tab-fill">dashboard</span>
<p class="text-[10px] font-medium uppercase tracking-widest">Producten</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">shopping_bag</span>
<p class="text-[10px] font-medium uppercase tracking-widest">Mandje</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<p class="text-[10px] font-medium uppercase tracking-widest">Profiel</p>
</a>
</nav>
</div>
</body></html>
